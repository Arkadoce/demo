<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <!-- Добавим Bootstrap для красоты, если хочешь -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-5">

<div class="container" style="max-width: 400px;">
    <h2 class="mb-4">Создать аккаунт</h2>

    <!-- Форма -->
    <form th:action="@{/api/auth/register}" th:object="${registrationRequest}" method="post">

        <!-- Сообщение об ошибке (показывается только если error не null) -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="mb-3">
            <input type="text" th:field="*{username}" placeholder="Логин" class="form-control" required/>
        </div>

        <div class="mb-3">
            <input type="password" th:field="*{password}" placeholder="Пароль" class="form-control" required/>
        </div>

        <button type="submit" class="btn btn-primary w-100">Создать аккаунт</button>
    </form>
</div>

</body>
</html>
