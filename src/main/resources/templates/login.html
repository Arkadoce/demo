<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход - D&D Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; display: flex; align-items: center; height: 100vh; }
        .login-card { background: #2a2a2a; padding: 30px; border-radius: 10px; border: 1px solid #d4af37; width: 100%; max-width: 400px; margin: auto; box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        .form-control { background: #333; border: 1px solid #555; color: white; }
        .form-control:focus { background: #444; color: white; border-color: #d4af37; box-shadow: none; }
        .btn-dnd { background: #d4af37; color: black; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-dnd:hover { background: #b8962e; }
        .gold-text { color: #d4af37; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 class="text-center mb-4 gold-text">Вход в систему</h2>

    <!-- Сообщение об ошибке (если логин/пароль неверны) -->
    <div th:if="${param.error}" class="alert alert-danger" style="font-size: 0.9rem;">
        Неверный логин или пароль.
    </div>

    <!-- Сообщение об успешной регистрации (если пришли с редиректа) -->
    <div th:if="${param.success}" class="alert alert-success" style="font-size: 0.9rem;">
        Регистрация прошла успешно! Войдите в аккаунт.
    </div>

    <!--
        ВАЖНО: action должен совпадать с loginProcessingUrl в SecurityConfig.
        Имена полей ОБЯЗАТЕЛЬНО "username" и "password".
    -->
    <form th:action="@{/api/auth/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Имя пользователя</label>
            <input type="text" name="username" class="form-control" required placeholder="Введите ваш логин">
        </div>
        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control" required placeholder="Введите пароль">
        </div>
        <button type="submit" class="btn btn-dnd">Войти</button>
    </form>

    <div class="text-center mt-3">
        <span class="text-muted">Нет аккаунта?</span>
        <a th:href="@{/api/auth/register}" class="gold-text text-decoration-none">Зарегистрироваться</a>
    </div>
</div>

</body>
</html>
