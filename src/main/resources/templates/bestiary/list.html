<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Бестиарий - D&D Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Левая панель (список) */
        .sidebar { width: 300px; background: #252525; border-right: 2px solid #d4af37; overflow-y: auto; padding: 10px; }
        .monster-link { display: block; padding: 10px; color: #ccc; text-decoration: none; border-bottom: 1px solid #333; }
        .monster-link:hover { background: #333; color: #d4af37; }

        /* Правая панель (описание) */
        .content { flex: 1; padding: 40px; overflow-y: auto; background: #1a1a1a; }
        .monster-header { border-bottom: 2px solid #d4af37; margin-bottom: 20px; padding-bottom: 10px; }
        .gold { color: #d4af37; }
        .stat-box { background: #2a2a2a; padding: 15px; border-radius: 5px; margin-bottom: 20px; }

        .filter-group small {
        color: #aaaaaa !important; /* Светло-серый */
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
        margin-bottom: 8px;
        display: block;
}
    </style>
</head>
<body>

<!-- Простая навигация сверху -->
<nav class="navbar navbar-dark bg-dark border-bottom border-warning">
    <div class="container-fluid">
        <a class="navbar-brand gold" href="/">⬅ На главную</a>
        <span class="navbar-text">Бестиарий (Всего: [[${monsters.size()}]])</span>
    </div>
</nav>

<div class="main-container">
    <!-- Левое меню -->
    <div class="sidebar">

        <!-- 1. ID для поиска имени -->
        <input type="text" id="monster-search"
               class="form-control mb-3 bg-dark text-white border-secondary"
               placeholder="Поиск монстра...">

        <!-- 2. Кнопки фильтров (Тип) -->
        <div class="filter-group mb-3">
            <small class="text-muted d-block mb-1">Тип:</small>
            <div class="d-flex flex-wrap gap-1">
                <!-- data-value должен СТРОГО совпадать с твоим Enum в Java (например, BEAST, DRAGON) -->
                <button class="btn btn-outline-warning btn-sm filter-btn filter-btn-type" data-value="HUMANOID">Гум.</button>
                <button class="btn btn-outline-warning btn-sm filter-btn filter-btn-type" data-value="BEAST">Зверь</button>
                <button class="btn btn-outline-warning btn-sm filter-btn filter-btn-type" data-value="DRAGON">Драк.</button>
                <button class="btn btn-outline-warning btn-sm filter-btn filter-btn-type" data-value="">Все</button>
            </div>
        </div>

        <!-- 3. Кнопки фильтров (CR) -->
        <div class="filter-group mb-3">
            <small class="text-muted d-block mb-1">Опасность (CR):</small>
            <div class="d-flex flex-wrap gap-1">
                <button class="btn btn-outline-info btn-sm filter-btn filter-btn-cr" data-value="0.25">1/4</button>
                <button class="btn btn-outline-info btn-sm filter-btn filter-btn-cr" data-value="0.5">1/2</button>
                <button class="btn btn-outline-info btn-sm filter-btn filter-btn-cr" data-value="1.0">1</button>
                <button class="btn btn-outline-info btn-sm filter-btn filter-btn-cr" data-value="">Все</button>
            </div>
        </div>

        <hr class="border-secondary">

        <!-- 4. ID для контейнера, который JS будет ПЕРЕРИСОВЫВАТЬ -->
        <div id="monster-list-container">
            <div th:each="m : ${monsters}">
                <!--
                    Заменяем th:href на href="javascript:void(0)"
                    И добавляем th:onclick, чтобы вызывалась наша JS функция
                -->
                <a href="javascript:void(0)"
                   th:onclick="|loadMonster(${m.id})|"
                   class="monster-link"
                   th:text="${m.name}">Гоблин</a>
            </div>
        </div>
    </div>

    <!-- Область описания (для начала просто выведем первого или заглушку) -->
    <!-- Добавляем th:fragment, чтобы JS мог запрашивать только этот блок -->
    <div class="content" th:fragment="monster-details" id="monster-details-container">

        <!-- Если монстр выбран (передан из контроллера) -->
        <div th:if="${selectedMonster != null}">
            <div class="monster-header">
                <h1 th:text="${selectedMonster.name}" class="gold">Название</h1>
                <em th:text="${selectedMonster.size} + ' ' + ${selectedMonster.type} + ', ' + ${selectedMonster.challengeRating}">
                    Размер, Тип, CR
                </em>
            </div>

            <div class="stat-box">
                <strong>Класс Доспеха:</strong> <span th:text="${selectedMonster.armorClass}">15</span><br>
                <strong>Хиты:</strong> <span th:text="${selectedMonster.health}">7</span><br>
                <strong>Скорость:</strong> <span th:text="${selectedMonster.speed}">30 футов</span>
            </div>

            <p th:text="${selectedMonster.description}"></p>

            <table class="table table-dark table-bordered text-center mt-4">
                <tr class="gold">
                    <th>СИЛ</th><th>ЛОВ</th><th>ТЕЛ</th><th>ИНТ</th><th>МУД</th><th>ХАР</th>
                </tr>
                <tr>
                    <!-- Обрати внимание на названия полей в твоем StatsDto (обычно с маленькой буквы) -->
                    <td th:text="${selectedMonster.statsDto.Str + ' (' + selectedMonster.statsDto.strMod + ')'}">10</td>
                    <td th:text="${selectedMonster.statsDto.Dex + ' (' + selectedMonster.statsDto.dexMod + ')'}">10</td>
                    <td th:text="${selectedMonster.statsDto.Con + ' (' + selectedMonster.statsDto.conMod + ')'}">10</td>
                    <td th:text="${selectedMonster.statsDto.Int + ' (' + selectedMonster.statsDto.intMod + ')'}">10</td>
                    <td th:text="${selectedMonster.statsDto.Wis + ' (' + selectedMonster.statsDto.wisMod + ')'}">10</td>
                    <td th:text="${selectedMonster.statsDto.Cha + ' (' + selectedMonster.statsDto.chaMod + ')'}">10</td>
                </tr>
            </table>
        </div>

        <!-- Если монстр еще не выбран (при первом заезде на страницу) -->
        <div th:unless="${selectedMonster != null}" class="text-center mt-5">
            <h3 class="text-muted">Выберите существо из списка слева, чтобы увидеть подробности</h3>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // 1. ФУНКЦИЯ ЗАГРУЗКИ (она должна быть видна всем)
   async function loadMonster(id) {
       console.log("Нажат монстр с ID:", id); // Это появится в консоли при клике
       try {
           // Путь должен быть таким же, как в твоем BestiaryHtmlController
           const response = await fetch(`/bestiary?id=${id}&fragment=details`);
           const html = await response.text();

           const container = document.getElementById('monster-details-container');
           if (container) {
               container.innerHTML = html;
           }

           // Обновляем URL, чтобы можно было нажать "Назад" в браузере
           window.history.pushState({}, '', `/bestiary?id=${id}`);
       } catch (e) {
           console.error("Ошибка при загрузке деталей:", e);
       }
   }

   // Функция для сбора фильтров и запроса данных
   async function updateFilters() {
       const name = document.getElementById('monster-search').value;

       // Ищем активную кнопку в группе типов
       const activeTypeBtn = document.querySelector('.filter-btn-type.active');
       const type = activeTypeBtn ? activeTypeBtn.dataset.value : '';

       // Ищем активную кнопку в группе CR
       const activeCrBtn = document.querySelector('.filter-btn-cr.active');
       const cr = activeCrBtn ? activeCrBtn.dataset.value : '';

       // Собираем параметры (имена должны совпадать с @RequestParam в контроллере!)
       const params = new URLSearchParams();
       if (name) params.append('name', name);
       if (type) params.append('type', type);
       if (cr) params.append('cr', cr);

       const response = await fetch('/api/bestiary/filter?' + params.toString());
       const monsters = await response.json();

       async function loadMonsterDetails(id) {
           try {
               // Запрашиваем у HTML-контроллера только ПРАВУЮ часть страницы
               const response = await fetch(`/api/bestiary/fr?id=${id}&fragment=details`);
               const html = await response.text();

               // Находим правую панель (убедись, что у нее класс 'content')
               const contentArea = document.querySelector('.content');
               contentArea.innerHTML = html;

               // Опционально: обновляем URL в строке браузера без перезагрузки
               history.pushState(null, '', `/api/bestiary/fr?id=${id}`);
           } catch (error) {
               console.error('Ошибка при загрузке карточки:', error);
           }
       }

       // Перерисовываем список
       const container = document.getElementById('monster-list-container');
       container.innerHTML = monsters.map(m => `
           <a href="javascript:void(0)" onclick="loadMonster(${m.id})" class="monster-link">${m.name}</a>
       `).join('');
   }

   // Слушаем ввод текста
   document.getElementById('monster-search').addEventListener('input', updateFilters);

   // Слушаем клики по кнопкам
   document.querySelectorAll('.filter-btn').forEach(btn => {
       btn.addEventListener('click', function() {
           // Внутри своей группы убираем 'active' у всех и даем этой кнопке
           this.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
           this.classList.add('active');

           updateFilters();
       });
   });
</script>
</body>
</html>
